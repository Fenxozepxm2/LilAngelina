<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Lil Angelina Exact UI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0c0c0c;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: auto;
    }

    .top-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 20px 0;
    }

    .top-card {
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .top-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      text-align: center;
      color: #ff2a4f;
      margin: 20px 0;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid #ff2a4f;
      border-left: 1px solid #ff2a4f;
    }

    .item {
      border-right: 1px solid #ff2a4f;
      border-bottom: 1px solid #ff2a4f;
      text-align: center;
      padding: 20px;
    }

    .item img {
      width: 100%;
      max-width: 180px;
    }

    .buy {
      margin-top: 10px;
      display: inline-block;
      background: #ff2a4f;
      padding: 6px 16px;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      align-items: center;
    }

    .logo {
      font-size: 18px;
    }

    .icons {
      display: flex;
      gap: 10px;
    }

    .icon {
      width: 18px;
      height: 18px;
      border: 1px solid #ff2a4f;
    }

  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const posters = [
  "https://picsum.photos/200/300?1",
  "https://picsum.photos/200/300?2",
  "https://picsum.photos/200/300?3",
  "https://picsum.photos/200/300?4"
];

const items = new Array(6).fill(0).map((_, i) => ({
  id: i,
  img: "https://picsum.photos/200/250?" + i
}));

function App() {
  return (
    <div className="container">

      <div className="header">
        <div className="logo">f*ck style — stitch</div>
        <div className="icons">
          <div className="icon"></div>
          <div className="icon"></div>
        </div>
      </div>

      {/* TOP POSTERS */}
      <div className="top-row">
        {posters.map((img, i) => (
          <div className="top-card" key={i}>
            <img src={img} />
          </div>
        ))}
      </div>

      {/* TITLE */}
      <div className="title">assortment</div>

      {/* GRID */}
      <div className="grid">
        {items.map(item => (
          <div className="item" key={item.id}>
            <img src={item.img} />
            <div className="buy">BUY</div>
          </div>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
